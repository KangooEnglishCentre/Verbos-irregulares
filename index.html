<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbos Irregulares</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Cuerpo */
  --bg:      #2a2a2a;
  --bg2:     #333333;
  --bg3:     #3d3d3d;
  --bg4:     #474747;
  --txt:     #f0eeea;
  --txt2:    #c0bdb8;
  --txt3:    #8a8785;
  --txt4:    #5a5855;
  /* Kangoo */
  --black:   #111111;
  --black2:  #1a1a1a;
  --yellow:  #e8c832;
  --yellow2: #f2d84a;
  --yellow3: #fae97a;
  --yellowbg:rgba(232,200,50,0.1);
  --yellowbd:rgba(232,200,50,0.3);
  /* Feedback */
  --green-bg: rgba(80,180,120,0.12);
  --green-bd: rgba(80,180,120,0.4);
  --green-tx: #7adba0;
  --red-bg:   rgba(220,80,80,0.12);
  --red-bd:   rgba(220,80,80,0.4);
  --red-tx:   #f08080;
  /* Borders */
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --r: 4px;
  --r2: 8px;
}

html{font-size:16px;}

body{
  font-family:'Instrument Sans',sans-serif;
  font-weight:400;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
}

/* ── HEADER ── */
.site-header{
  background:var(--black);
}
.header-inner{
  max-width:800px;margin:0 auto;
  padding:2.5rem 1.5rem 0;
}
.header-logo{
  height:52px;width:auto;display:block;
}
.header-top{
  display:flex;justify-content:space-between;
  align-items:baseline;margin-bottom:2rem;
}
.header-eyebrow{
  font-size:11px;font-weight:500;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--yellow);
}
.header-count{
  font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.04em;
}
h1{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(40px,7vw,68px);
  font-weight:400;line-height:0.95;
  letter-spacing:-0.02em;color:#fff;
  margin-bottom:2.5rem;
}
h1 i{font-style:italic;color:var(--yellow);}

/* ── TABS ── */
.tabs{display:flex;gap:0;}
.tab{
  padding:12px 22px;font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all 0.2s;background:none;
  border-top:none;border-left:none;border-right:none;
}
.tab:hover{color:rgba(255,255,255,0.65);}
.tab.active{
  color:var(--yellow);
  border-bottom:2px solid var(--yellow);
}

.panel{display:none;}.panel.active{display:block;}

/* ── CONTAINER ── */
.container{
  max-width:800px;margin:0 auto;
  padding:2.5rem 1.5rem 5rem;
  background:var(--bg);
}

/* ── SECTION ── */
.section{
  border:1px solid var(--border2);
  border-radius:var(--r2);
  background:var(--bg2);
  margin-bottom:1.25rem;
  overflow:hidden;
}
.section-head{
  padding:.875rem 1.25rem;
  border-bottom:1px solid var(--border2);
  background:var(--black2);
  font-size:10px;font-weight:500;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--yellow);
}
.section-body{padding:1.25rem;}

/* ── INPUTS ── */
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:1rem;}
.grp{display:flex;flex-direction:column;gap:4px;}
.grp label{font-size:11px;font-weight:500;color:var(--txt3);letter-spacing:0.04em;}
.grp input[type=number]{
  width:84px;padding:9px 12px;
  font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;
  border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg3);color:var(--txt);
  transition:border-color 0.15s;
}
.grp input[type=number]:focus{outline:none;border-color:var(--yellow);background:var(--bg4);}
.range-note{font-size:12px;color:var(--txt3);margin-top:-2px;font-style:italic;}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{
  font-size:11px;font-weight:500;letter-spacing:0.05em;
  padding:6px 14px;border-radius:2px;
  border:1px solid var(--border2);background:var(--bg3);
  color:var(--txt3);cursor:pointer;transition:all 0.15s;
}
.chip:hover{border-color:var(--yellow);color:var(--yellow2);}
.chip.active{background:var(--yellow);border-color:var(--yellow);color:var(--black);}

/* ── BUTTONS ── */
button{
  padding:9px 20px;font-size:12px;font-weight:500;
  letter-spacing:0.06em;
  font-family:'Instrument Sans',sans-serif;
  border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg3);color:var(--txt2);
  cursor:pointer;transition:all 0.15s;
}
button:hover{background:var(--bg4);border-color:var(--border2);}
button:disabled{opacity:0.3;cursor:default;}
button.primary{
  background:var(--yellow);border-color:var(--yellow);color:var(--black);font-weight:600;
}
button.primary:hover{background:var(--yellow2);border-color:var(--yellow2);}

/* ── SELECTOR ── */
.sel-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
.sel-toolbar input[type=text]{
  flex:1;min-width:160px;padding:9px 12px;font-size:13px;
  border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg2);color:var(--txt);
  font-family:'Instrument Sans',sans-serif;
}
.sel-toolbar input[type=text]::placeholder{color:var(--txt4);font-style:italic;}
.sel-toolbar input[type=text]:focus{outline:none;border-color:var(--yellow);}
.sel-count{font-size:11px;color:var(--txt3);white-space:nowrap;font-style:italic;}

.verb-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(185px,1fr));
  gap:1px;background:var(--border);
  border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
  max-height:400px;overflow-y:auto;
  margin-bottom:1rem;
}
.verb-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;background:var(--bg2);
  cursor:pointer;transition:background 0.1s;
}
.verb-item:hover{background:var(--bg3);}
.verb-item.selected{background:var(--yellowbg);}
.verb-item .num{font-size:10px;color:var(--txt4);min-width:20px;}
.verb-item.selected .num{color:var(--yellow);}
.verb-item .inf{
  font-family:'Instrument Serif',serif;
  font-size:16px;font-weight:400;color:var(--txt);
}
.verb-item.selected .inf{color:var(--yellow2);}
.verb-item .mng{font-size:10px;color:var(--txt3);}
.verb-item .chk{
  width:14px;height:14px;border-radius:2px;
  border:1px solid var(--border2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  margin-left:auto;flex-shrink:0;font-size:9px;color:var(--yellow);
}
.verb-item.selected .chk{border-color:var(--yellow);background:var(--yellowbg);}

/* ── QUIZ ── */
.progress-wrap{
  height:2px;background:var(--bg4);
  margin-bottom:2rem;overflow:visible;position:relative;
}
.progress-bar{
  height:2px;background:var(--yellow);
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.progress-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--yellow);
  position:absolute;top:-2.5px;
  transition:left 0.5s cubic-bezier(0.4,0,0.2,1);
}
.counter{
  font-size:11px;color:var(--txt3);letter-spacing:0.08em;
  margin-bottom:1.5rem;
}

.verb-card{
  border:1px solid var(--border2);
  border-radius:var(--r2);
  background:var(--bg2);
  padding:2.5rem 2rem 2rem;
  margin-bottom:1rem;
  position:relative;
}
.hint-type{
  position:absolute;top:1.25rem;right:1.25rem;
  font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--black);
  padding:4px 10px;border:1px solid var(--yellow);
  border-radius:2px;background:var(--yellow);
}
.hint-val{
  font-family:'Instrument Serif',serif;
  font-size:52px;font-weight:400;font-style:italic;
  letter-spacing:-0.01em;color:var(--txt);
  margin-bottom:2.5rem;line-height:1;
}

.cols{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;}
.field-wrap{display:flex;flex-direction:column;gap:4px;}
.field-wrap label{
  font-size:9px;font-weight:500;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--txt3);
}
.field-wrap input{
  padding:8px 10px;font-size:14px;font-weight:400;
  font-family:'Instrument Sans',sans-serif;
  border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg3);color:var(--txt);
  width:100%;transition:all 0.15s;
}
.field-wrap input::placeholder{color:var(--txt4);font-style:italic;}
.field-wrap input:focus{outline:none;border-color:var(--yellow);background:var(--bg4);}
.field-wrap input:disabled{background:var(--bg3);color:var(--txt3);border-color:var(--border);}
.field-wrap input.correct{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);}
.field-wrap input.wrong{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);}
.answer-hint{font-size:11px;color:var(--green-tx);margin-top:3px;display:none;font-style:italic;}

.btn-row{display:flex;gap:8px;margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid var(--border);}

/* ── RESULT ── */
.result-wrap{
  border:1px solid var(--border2);border-radius:var(--r2);
  overflow:hidden;margin-bottom:1rem;
}
.result-top{
  background:var(--black);padding:3rem 2rem 2rem;text-align:center;
}
.result-pct{
  font-family:'Instrument Serif',serif;
  font-size:96px;font-weight:400;font-style:italic;
  line-height:1;color:var(--yellow);margin-bottom:4px;
}
.result-msg{
  font-size:13px;letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(255,255,255,0.5);font-weight:500;
}
.result-bottom{background:var(--black2);padding:2rem;}
.stats-row{
  display:flex;justify-content:center;gap:0;
  border:1px solid var(--border2);border-radius:var(--r2);
  overflow:hidden;margin-bottom:1.5rem;
}
.stat-box{
  flex:1;padding:1.25rem;text-align:center;
  border-right:1px solid var(--border2);
}
.stat-box:last-child{border-right:none;}
.stat-num{
  font-family:'Instrument Serif',serif;
  font-size:32px;font-weight:400;font-style:italic;color:#fff;
}
.stat-lbl{font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:2px;}
.green{color:#7adba0;}
.red{color:#f08080;}

.missed-section{margin-bottom:1.5rem;}
.missed-title{font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.missed-list{display:flex;flex-wrap:wrap;gap:4px;}
.missed-pill{
  font-family:'Instrument Serif',serif;
  font-size:14px;font-style:italic;
  padding:3px 10px;border-radius:2px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--txt2);
}
.result-btns{display:flex;gap:8px;flex-wrap:wrap;}
.result-bottom button{
  background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12);color:var(--txt2);
}
.result-bottom button:hover{background:rgba(255,255,255,0.12);}
.result-bottom button.primary{
  background:var(--yellow);border-color:var(--yellow);color:var(--black);
}
.result-bottom button.primary:hover{background:var(--yellow2);border-color:var(--yellow2);}

@media(max-width:520px){
  .cols{grid-template-columns:1fr 1fr;}
  .verb-grid{grid-template-columns:1fr 1fr;}
  h1{font-size:38px;}
  .hint-val{font-size:36px;}
  .result-pct{font-size:64px;}
  .tab{padding:10px 14px;}
  .verb-card{padding:1.5rem 1.25rem 1.25rem;}
}
</style>
</head>

      <button onclick="selectAll()">Todos</button>
      <button onclick="clearAll()">Limpiar</button>
      <button class="primary" id="start-custom-btn" onclick="startCustom()" disabled>Practicar →</button>
    </div>
    <div class="verb-grid" id="verb-grid"></div>
    <div id="quiz-custom"></div>
  </div>

</div>

<script>
const VERBS=[
  ["be","was / were","been","ser / estar"],
  ["become","became","become","llegar a ser"],
  ["begin","began","begun","empezar, comenzar"],
  ["bite","bit","bitten","morder"],
  ["break","broke","broken","romper"],
  ["bring","brought","brought","traer / llevar"],
  ["build","built","built","construir"],
  ["burn","burnt, burned","burnt, burned","quemar / arder"],
  ["buy","bought","bought","comprar"],
  ["can","could","----------","poder"],
  ["catch","caught","caught","coger, atrapar"],
  ["choose","chose","chosen","elegir, escoger"],
  ["come","came","come","venir, llegar"],
  ["cost","cost","cost","costar"],
  ["cut","cut","cut","cortar"],
  ["do","did","done","hacer"],
  ["draw","drew","drawn","dibujar"],
  ["dream","dreamt","dreamt","soñar"],
  ["drink","drank","drunk","beber"],
  ["drive","drove","driven","conducir"],
  ["eat","ate","eaten","comer"],
  ["fall","fell","fallen","caerse"],
  ["feed","fed","fed","alimentar"],
  ["feel","felt","felt","sentir"],
  ["fight","fought","fought","luchar"],
  ["find","found","found","encontrar"],
  ["fly","flew","flown","volar"],
  ["forget","forgot","forgotten","olvidar"],
  ["freeze","froze","frozen","helar, congelar"],
  ["get","got","got","conseguir, obtener"],
  ["give","gave","given","dar"],
  ["go","went","gone","ir"],
  ["grow","grew","grown","crecer / cultivar"],
  ["have","had","had","tener / haber"],
  ["hear","heard","heard","oír"],
  ["hide","hid","hidden","esconder"],
  ["hit","hit","hit","golpear / chocar"],
  ["hold","held","held","sostener / aguantar"],
  ["hurt","hurt","hurt","herir / doler"],
  ["keep","kept","kept","conservar / mantener"],
  ["know","knew","known","saber, conocer"],
  ["learn","learnt, learned","learnt, learned","aprender"],
  ["leave","left","left","dejar (abandonar)"],
  ["lend","lent","lent","prestar"],
  ["let","let","let","dejar (permitir)"],
  ["lose","lost","lost","perder"],
  ["make","made","made","hacer, fabricar"],
  ["mean","meant","meant","significar"],
  ["meet","met","met","encontrarse / quedar con"],
  ["pay","paid","paid","pagar"],
  ["put","put","put","poner, colocar"],
  ["read","read","read","leer"],
  ["ride","rode","ridden","montar"],
  ["ring","rang","rung","sonar"],
  ["run","ran","run","correr"],
  ["say","said","said","decir"],
  ["see","saw","seen","ver"],
  ["sell","sold","sold","vender"],
  ["send","sent","sent","enviar"],
  ["shine","shone","shone","brillar"],
  ["shoot","shot","shot","disparar"],
  ["shut","shut","shut","cerrar (fuertemente)"],
  ["sing","sang","sung","cantar"],
  ["sit","sat","sat","sentarse"],
  ["sleep","slept","slept","dormir"],
  ["speak","spoke","spoken","hablar"],
  ["spell","spelt","spelt","deletrear"],
  ["spend","spent","spent","gastar"],
  ["stand","stood","stood","estar de pie / colocar"],
  ["steal","stole","stolen","robar"],
  ["swim","swam","swum","nadar"],
  ["swing","swung","swung","balancearse"],
  ["take","took","taken","llevarse / coger"],
  ["teach","taught","taught","enseñar"],
  ["tell","told","told","decir (contar)"],
  ["think","thought","thought","pensar"],
  ["throw","threw","thrown","arrojar, lanzar"],
  ["understand","understood","understood","entender, comprender"],
  ["wake","woke","woken","despertar"],
  ["wear","wore","worn","llevar puesto"],
  ["win","won","won","ganar"],
  ["write","wrote","written","escribir"]
];

const COLS=["Infinitive","Past simple","Past participle","Significado"];
let hintMode='random',hintMode2='random';
let selectedIdx=new Set();
let queue=[],idx=0,correct=0,wrong=0,missedVerbs=[];
let activeQuizArea='';

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');document.getElementById('panel-'+t).classList.add('active');
}
function setHintMode(m,el){hintMode=m;document.querySelectorAll('[id^="hm-"]').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function setHintMode2(m,el){hintMode2=m;document.querySelectorAll('[id^="hm2-"]').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function getHintCol(mode){
  if(mode==='meaning') return 3;if(mode==='infinitive') return 0;
  return Math.floor(Math.random()*4);
}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}

function buildGrid(){
  const grid=document.getElementById('verb-grid');
  grid.innerHTML=VERBS.map((v,i)=>`
    <div class="verb-item${selectedIdx.has(i)?' selected':''}" onclick="toggleVerb(${i})" id="vi-${i}">
      <span class="num">${i+1}</span>
      <div style="flex:1;min-width:0">
        <div class="inf">${v[0]}</div>
        <div class="mng">${v[3]}</div>
      </div>
      <div class="chk">${selectedIdx.has(i)?'✓':''}</div>
    </div>`).join('');
  updateSelCount();
}
function filterVerbs(){
  const q=document.getElementById('search-box').value.toLowerCase();
  VERBS.forEach((v,i)=>{
    const el=document.getElementById('vi-'+i);if(!el) return;
    const match=!q||v[0].toLowerCase().includes(q)||v[3].toLowerCase().includes(q)||String(i+1).includes(q);
    el.style.display=match?'':'none';
  });
}
function toggleVerb(i){
  if(selectedIdx.has(i)) selectedIdx.delete(i); else selectedIdx.add(i);
  const el=document.getElementById('vi-'+i);
  if(el){el.className='verb-item'+(selectedIdx.has(i)?' selected':'');el.querySelector('.chk').textContent=selectedIdx.has(i)?'✓':'';}
  updateSelCount();
}
function updateSelCount(){
  document.getElementById('sel-count').textContent=selectedIdx.size+' seleccionados';
  document.getElementById('start-custom-btn').disabled=selectedIdx.size===0;
}
function selectAll(){VERBS.forEach((_,i)=>{const el=document.getElementById('vi-'+i);if(el&&el.style.display!=='none')selectedIdx.add(i);});buildGrid();filterVerbs();}
function clearAll(){selectedIdx.clear();buildGrid();filterVerbs();}

function updateRangeCount(){
  let a=parseInt(document.getElementById('from').value)||1;
  let b=parseInt(document.getElementById('to').value)||1;
  a=Math.max(1,Math.min(a,82));b=Math.max(a,Math.min(b,82));
  const total=b-a+1;
  const rc=document.getElementById('range-count');
  rc.max=total;if(parseInt(rc.value)>total) rc.value=total;
  document.getElementById('range-info').textContent=`${total} verbo${total!==1?'s':''} seleccionados, del ${a} al ${b}`;
}
function startRange(){
  let a=parseInt(document.getElementById('from').value)-1;
  let b=parseInt(document.getElementById('to').value)-1;
  a=Math.max(0,Math.min(a,81));b=Math.max(a,Math.min(b,81));
  const total=b-a+1;
  let n=parseInt(document.getElementById('range-count').value);
  n=Math.max(1,Math.min(n,total));
  const subset=shuffle(VERBS.slice(a,b+1).map((v,i)=>({verb:v,origIdx:a+i}))).slice(0,n).map(({verb,origIdx})=>({verb,hint:getHintCol(hintMode),origIdx}));
  activeQuizArea='quiz-range';launchQuiz(subset);
}
function startCustom(){
  if(selectedIdx.size===0) return;
  const subset=[...selectedIdx].map(i=>({verb:VERBS[i],hint:getHintCol(hintMode2),origIdx:i}));
  activeQuizArea='quiz-custom';
  document.getElementById('verb-grid').style.display='none';
  document.querySelector('.sel-toolbar').style.display='none';
  launchQuiz(shuffle(subset));
}
function launchQuiz(q){queue=q;idx=0;correct=0;wrong=0;missedVerbs=[];renderQ();}

function norm(s){return s.trim().toLowerCase();}
function tokenize(s){return s.split(/[\s\/,]+/).map(x=>norm(x)).filter(x=>x.length>0);}
function isDashes(s){return s.trim()===''||/^[-\/\s]+$/.test(s.trim());}
function accepted(inp,correct){
  if(isDashes(correct)) return isDashes(inp);
  const ct=tokenize(correct),it=tokenize(inp);
  if(norm(correct)==='was / were') return ['was','were'].every(w=>it.includes(w));
  return ct.some(c=>it.includes(c));
}

function renderQ(){
  const area=document.getElementById(activeQuizArea);
  if(idx>=queue.length){renderResult();return;}
  const {verb,hint}=queue[idx];
  const pct=Math.round((idx/queue.length)*100);
  const dotRight=`calc(${100-pct}% - 3px)`;
  area.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
      <div class="progress-dot" style="right:${dotRight}"></div>
    </div>
    <p class="counter">Verbo ${idx+1} de ${queue.length}</p>
    <div class="verb-card">
      <div class="hint-type">${COLS[hint]}</div>
      <div class="hint-val">${verb[hint]}</div>
      <div class="cols">
        ${COLS.map((col,i)=>`
          <div class="field-wrap">
            <label>${col}</label>
            ${i===hint
              ?`<input disabled value="${verb[i]}">`
              :`<input placeholder="..." id="f${i}" onkeydown="if(event.key==='Enter')checkAnswer()">`}
            <span class="answer-hint" id="h${i}">${verb[i]}</span>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="primary" onclick="checkAnswer()">Comprobar</button>
        <button onclick="skipVerb()">Saltar</button>
      </div>
    </div>`;
  setTimeout(()=>{const f=document.querySelector('#'+activeQuizArea+' input:not([disabled])');if(f) f.focus();},50);
}

function checkAnswer(){
  const {verb,hint}=queue[idx];let allOk=true;
  for(let i=0;i<4;i++){
    if(i===hint) continue;
    const inp=document.getElementById('f'+i);if(!inp) continue;
    const ok=accepted(inp.value,verb[i]);
    inp.disabled=true;inp.className=ok?'correct':'wrong';
    const hEl=document.getElementById('h'+i);if(hEl) hEl.style.display=ok?'none':'block';
    if(!ok) allOk=false;
  }
  if(allOk) correct++; else{wrong++;missedVerbs.push(verb);}
  setTimeout(()=>{idx++;renderQ();},allOk?800:1800);
}
function skipVerb(){
  wrong++;const {verb,hint}=queue[idx];missedVerbs.push(verb);
  for(let i=0;i<4;i++){
    if(i===hint) continue;
    const inp=document.getElementById('f'+i);if(!inp) continue;
    inp.value=verb[i];inp.disabled=true;inp.className='wrong';
    const hEl=document.getElementById('h'+i);if(hEl) hEl.style.display='block';
  }
  setTimeout(()=>{idx++;renderQ();},1400);
}

function renderResult(){
  const area=document.getElementById(activeQuizArea);
  const total=correct+wrong;
  const pct=total?Math.round((correct/total)*100):0;
  const msg=pct>=90?'Excelente resultado':pct>=70?'Buen trabajo':'Sigue practicando';
  const missed=missedVerbs.map(v=>`<span class="missed-pill">${v[0]}</span>`).join('');
  const missedSection=missedVerbs.length?`
    <div class="missed-section">
      <div class="missed-title">Verbos con errores</div>
      <div class="missed-list">${missed}</div>
    </div>`:'';
  area.innerHTML=`
    <div class="result-wrap">
      <div class="result-top">
        <div class="result-pct">${pct}%</div>
        <div class="result-msg">${msg}</div>
      </div>
      <div class="result-bottom">
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num green">${correct}</div><div class="stat-lbl">Correctas</div></div>
          <div class="stat-box"><div class="stat-num red">${wrong}</div><div class="stat-lbl">Errores</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--ink2)">${total}</div><div class="stat-lbl">Total</div></div>
        </div>
        ${missedSection}
        <div class="result-btns">
          <button class="primary" onclick="retryMissed()" ${missedVerbs.length?'':'disabled'}>Repetir fallados →</button>
          <button onclick="relaunch()">Repetir bloque</button>
          <button onclick="backToConfig()">Volver</button>
        </div>
      </div>
    </div>`;
}
function backToConfig(){
  document.getElementById(activeQuizArea).innerHTML='';
  if(activeQuizArea==='quiz-custom'){document.getElementById('verb-grid').style.display='grid';document.querySelector('.sel-toolbar').style.display='flex';}
}
function retryMissed(){
  const missed=missedVerbs.slice();const mode=activeQuizArea==='quiz-custom'?hintMode2:hintMode;
  launchQuiz(shuffle(missed.map(v=>({verb:v,hint:getHintCol(mode)}))));
}
function relaunch(){
  const mode=activeQuizArea==='quiz-custom'?hintMode2:hintMode;
  launchQuiz(shuffle(queue.map(({verb})=>({verb,hint:getHintCol(mode)}))));
}

buildGrid();
updateRangeCount();
</script>
</body>
</html>
